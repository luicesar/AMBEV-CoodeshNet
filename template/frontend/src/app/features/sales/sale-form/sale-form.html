<div class="page">
  <header>
    <h1>{{ isEdit ? 'Editar Venda' : 'Nova Venda' }}</h1>
    <button class="btn-outline" (click)="cancel()">← Voltar</button>
  </header>

  <div class="error" *ngIf="error">{{ error }}</div>
  <div class="loading" *ngIf="loading">Carregando...</div>

  <form *ngIf="!loading" (ngSubmit)="save()">
    <div class="card">
      <h3>Dados da Venda</h3>
      <div class="grid-3">
        <div class="form-group">
          <label>Número da Venda *</label>
          <input [(ngModel)]="saleNumber" name="saleNumber" [disabled]="isEdit" placeholder="SALE-2024-001" required />
        </div>
        <div class="form-group">
          <label>Data *</label>
          <input type="date" [(ngModel)]="saleDate" name="saleDate" required />
        </div>
      </div>

      <div class="grid-2">
        <div class="form-group">
          <label>Nome do Cliente *</label>
          <input [(ngModel)]="customerName" name="customerName" placeholder="Nome do cliente" required />
        </div>
        <div class="form-group">
          <label>Filial *</label>
          <input [(ngModel)]="branchName" name="branchName" placeholder="Nome da filial" required />
        </div>
      </div>
    </div>

    <div class="card">
      <div class="section-header">
        <h3>Itens da Venda</h3>
        <button type="button" class="btn-outline-orange" (click)="addItem()">+ Adicionar Item</button>
      </div>

      <div class="item-row" *ngFor="let item of items; let i = index">
        <div class="item-fields">
          <div class="form-group">
            <label>Produto *</label>
            <input [(ngModel)]="item.productName" [name]="'productName' + i" placeholder="Nome do produto" required />
          </div>

          <div class="form-group narrow">
            <label>Qtd *</label>
            <input type="number" [(ngModel)]="item.quantity" [name]="'qty' + i"
                   min="1" max="20"
                   (ngModelChange)="onQuantityChange(item)"
                   [class.invalid]="isItemInvalid(item)" />
          </div>

          <div class="form-group narrow">
            <label>Preço Unit. *</label>
            <input type="number" [(ngModel)]="item.unitPrice" [name]="'price' + i"
                   min="0.01" step="0.01"
                   (ngModelChange)="onPriceChange(item)" />
          </div>

          <div class="form-group narrow">
            <label>Desconto</label>
            <span class="discount-badge" [class.discount-active]="item.discount > 0" [class.discount-error]="item.quantity > 20">
              {{ getDiscountLabel(item.quantity) }}
            </span>
          </div>

          <div class="form-group narrow">
            <label>Total do Item</label>
            <span class="item-total">{{ item.totalAmount | currency:'BRL' }}</span>
          </div>

          <button type="button" class="btn-remove" (click)="removeItem(i)" [disabled]="items.length === 1">✕</button>
        </div>

        <div class="item-error" *ngIf="item.quantity > 20">
          ⚠ Máximo de 20 itens por produto.
        </div>
      </div>

      <div class="total-row">
        <strong>Total da Venda: {{ total | currency:'BRL' }}</strong>
      </div>
    </div>

    <div class="actions">
      <button type="button" class="btn-outline-dark" (click)="cancel()">Cancelar</button>
      <button type="submit" class="btn-primary" [disabled]="saving || !formValid">
        {{ saving ? 'Salvando...' : (isEdit ? 'Atualizar' : 'Criar Venda') }}
      </button>
    </div>
  </form>
</div>
